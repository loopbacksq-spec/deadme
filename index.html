<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V O I D</title>
    <style>
        /* Базовые мрачные стили и запреты */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: monospace;
            /* Видимый курсор со знаком СТОП для всей страницы */
            cursor: not-allowed; 
        }

        /* Весь сайт плавает вниз-вверх непрерывно */
        @keyframes globalFall {
            0% { transform: translateY(-5px); }
            50% { transform: translateY(5px); }
            100% { transform: translateY(-5px); }
        }

        #main-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: globalFall 4s ease-in-out infinite;
        }

        /* Задний фон с падающим непрерывным текстом */
        #glitch-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
            color: rgba(50, 0, 0, 0.45);
        }

        /* Контейнер потока текста — работает как терминал, новые строки идут снизу вверх */
        #glitch-bg-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
        }

        .glitch-line {
            animation: textScrollUp 0.4s ease forwards;
        }

        @keyframes textScrollUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ASCII Секция */
        #ascii-container {
            position: absolute;
            z-index: 10;
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease, transform 1.5s ease;
            text-align: center;
            width: 100%;
            max-width: 100vw;
            padding: 10px;
        }

        /* Стиль прозрачности арта, когда он становится фоном для БИО */
        #ascii-container.as-background {
            opacity: 0.25 !important;
            transform: scale(0.9);
            z-index: 5;
        }

        pre {
            font-family: monospace;
            font-size: 9px;
            line-height: 7px;
            white-space: pre;
            display: inline-block;
            margin: 0 auto;
            animation: colorShift 4s ease-in-out infinite;
            transition: opacity 1.5s ease-in-out;
        }

        @media (min-width: 768px) {
            pre {
                font-size: 13px;
                line-height: 10px;
            }
        }

        /* Цикличная смена цвета арта */
        @keyframes colorShift {
            0% { color: #000000; text-shadow: 0 0 2px #000; }
            50% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            100% { color: #000000; text-shadow: 0 0 2px #000; }
        }

        /* Шкала загрузки */
        #loading-box {
            position: absolute;
            bottom: 10%;
            z-index: 20;
            text-align: center;
            width: 80%;
            max-width: 400px;
            display: none;
        }

        #progress-bar {
            width: 100%;
            height: 4px;
            background: #111;
            border: 1px solid #333;
            margin-top: 5px;
            position: relative;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: #ff0000;
            box-shadow: 0 0 8px #ff0000;
            transition: width 0.1s linear;
        }

        /* Блок БИО */
        #bio-container {
            position: absolute;
            z-index: 30; /* Поверх полупрозрачного арта */
            display: none;
            text-align: center;
            color: #fff;
            max-width: 90%;
            background: rgba(0, 0, 0, 0.6);
            padding: 35px;
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            animation: fadeIn 2.5s ease forwards;
        }

        #bio-container a {
            color: #ff0000;
            text-decoration: none;
            pointer-events: auto;
            cursor: pointer; /* Для ссылок обычный курсор */
        }

        #bio-container p {
            margin: 10px 0;
            font-size: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* Кнопка */
        #dox-btn {
            margin-top: 25px;
            background: transparent;
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 10px 20px;
            font-family: monospace;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            box-shadow: 0 0 5px #ff0000;
        }

        #dox-btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 15px #ff0000;
        }

        #dox-result {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-align: left;
            display: inline-block;
            border-left: 2px solid #ff0000;
            padding-left: 10px;
            line-height: 1.5;
        }

        /* Падающие цитаты */
        .falling-quote {
            position: absolute;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            white-space: nowrap;
            z-index: 5;
            pointer-events: none;
            animation: quoteFall linear forwards;
        }

        @keyframes quoteFall {
            0% { transform: translateY(-50px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Инструкция для активации звука */
        #interaction-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff0000;
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            text-shadow: 0 0 5px #ff0000;
        }
    </style>
</head>

        let artQueue = []; // Очередь для исключения частых повторов артов

        const asciiArt = document.getElementById('ascii-art');
        const bgMusic = document.getElementById('bg-music');

        // Пулы текстов для безумного фона
        const bgTexts = ["IDON'TLOVEYOU", "die!", "Whoareyou?", "doyouloveme?", "VOIDVOIDVOID", "SMILE"];

        const quotes = [

        // Функция случайного перемешивания массива (алгоритм Фишера-Йетса)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Старт логики после клика пользователя
        document.getElementById('interaction-layer').addEventListener('click', function() {
            this.style.display = 'none';
            
            // Жесткий форсированный запуск музыки
            bgMusic.volume = 1.0;
            bgMusic.play().then(() => {
                console.log("Музыка успешно запущена!");
            }).catch(e => {
                console.log("Критическая ошибка воспроизведения, пробуем дублировать", e);
            });

            // Запускаем безумный вечный фон сразу после клика
            startPermanentGlitchBg();

            // Через 3 секунды появляется первый ASCII арт и остальные системы
            setTimeout(() => {
                artQueue = shuffle([...Array(arts.length).keys()]); // Инициализация очереди индексов
                currentArtIndex = artQueue.pop();
                
                asciiArt.textContent = arts[currentArtIndex];
                asciiContainer.style.display = 'block';
                setTimeout(() => { asciiContainer.style.opacity = '1'; }, 50);
                
                startArtRotation();
                startFallingQuotes();
                startLoadingProgress();
            }, 3000);
        });

        // Смена артов по стабильному таймеру раз в 7.5 секунд с плавным фейдом без поломок
        function startArtRotation() {
            function nextArt() {
                // Если очередь пуста, перемешиваем индексы заново
                if (artQueue.length === 0) {
                    artQueue = shuffle([...Array(arts.length).keys()]);
                    // Условие, чтобы первый элемент новой очереди не совпал с текущим артом
                    if (artQueue[artQueue.length - 1] === currentArtIndex) {
                        artQueue.unshift(artQueue.pop());
                    }
                }

                currentArtIndex = artQueue.pop();

                // Плавное затухание старого арта
                asciiContainer.style.opacity = '0';
                
                setTimeout(() => {
                    asciiArt.textContent = arts[currentArtIndex];
                    // Плавное появление нового арта
                    asciiContainer.style.opacity = '1';
                }, 1500); // 1.5 секунды на переход (арт не ломается при обновлении)

                setTimeout(nextArt, 7500); // Интервал смены зафиксирован, чтобы арты не менялись слишком быстро
            }
            setTimeout(nextArt, 7500);
        }

        // Логика ВЕЧНОГО фона — он больше никогда не пропадает, текст скользит сверху вниз
        function startPermanentGlitchBg() {
            const bg = document.getElementById('glitch-bg');
            const bgContent = document.getElementById('glitch-bg-content');
            
            bg.style.opacity = '1';

            function addScrollLine() {
                let lineText = "";
                // Генерируем заполненную строку хаоса
                for(let i = 0; i < 25; i++) {
                    lineText += bgTexts[Math.floor(Math.random() * bgTexts.length)] + " ";
                }
                
                const lineDiv = document.createElement('div');
                lineDiv.className = 'glitch-line';
                lineDiv.innerHTML = lineText;
                
                bgContent.appendChild(lineDiv);

                // Если строк становится слишком много, старые уходят вверх за пределы экрана и удаляются
                if (bgContent.children.length > 40) {
                    bgContent.removeChild(bgContent.children[0]);
                }
                
                // Каждые 300мс добавляется новая скользящая строка вниз, старая уходит наверх
                setTimeout(addScrollLine, 300);
            }
            addScrollLine();
        }

        // Логика падающих цитат (каждые 4-15 секунд)
        function startFallingQuotes() {
            function spawnQuote() {
                const quoteText = quotes[Math.floor(Math.random() * quotes.length)];
                const quoteEl = document.createElement('div');
                quoteEl.className = 'falling-quote';
                quoteEl.textContent = quoteText;
                
                quoteEl.style.left = Math.random() * (window.innerWidth - 250) + 'px';
                const duration = Math.random() * 7 + 8; // 8-15 сек
                quoteEl.style.animationDuration = duration + 's';

                document.getElementById('main-container').appendChild(quoteEl);

                setTimeout(() => { quoteEl.remove(); }, duration * 1000);
                setTimeout(spawnQuote, Math.random() * 11000 + 4000);
            }
            setTimeout(spawnQuote, Math.random() * 11000 + 4000);
        }

        // Шкала загрузки (30 секунд)
        function startLoadingProgress() {
            const box = document.getElementById('loading-box');
            const fill = document.getElementById('progress-fill');
            box.style.display = 'block';

            let progress = 0;
            const interval = setInterval(() => {
                progress += (100 / 300); 
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    box.style.display = 'none';
                    showBio();
                }
                fill.style.width = progress + '%';
            }, 100);
        }

        // Показ контента по центру поверх прозрачного фонового арта
        function showBio() {
            // Арты больше НЕ отключаются (display = 'none' убран)
            // Добавляем класс, который делает текущие и последующие арты полупрозрачным фоном сзади
            asciiContainer.classList.add('as-background');
            
            // Показываем БИО поверх арта
            document.getElementById('bio-container').style.display = 'block';
        }

        // Локальный сбор данных
        document.getElementById('dox-btn').addEventListener('click', function() {
            const resultBox = document.getElementById('dox-result');
            resultBox.innerHTML = "АНАЛИЗ ПАКЕТОВ ДАННЫХ...<br>";

            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            const dateStr = now.toLocaleDateString();
            const zone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            const Language = navigator.language || navigator.userLanguage;
            const Cores = navigator.hardwareConcurrency || "Неизвестно";
            const ScreenRes = `${window.screen.width}x${window.screen.height}`;
            const UserAgent = navigator.userAgent.split(' ')[0];

            let estimatedCity = "Unknown Entity";
            if (zone.includes("Moscow")) estimatedCity = "Moscow";
            else if (zone.includes("Europe")) estimatedCity = zone.split('/')[1];

            getUserIP((ip) => {
                resultBox.innerHTML = `
                    [!] СИСТЕМА ОБНАРУЖЕНА НАПРАВЛЕННЫМ ЛУЧОМ <br>
                    ---------------------------------------<br>
                    IP АДРЕС: ${ip || "127.0.0.1 (ЗАЩИЩЕН ВПН/БРАУЗЕРОМ)"}<br>
                    ВРЕМЯ СИСТЕМЫ: ${timeStr} | ${dateStr}<br>
                    ЛОКАЦИЯ РЕГИОНА: ${zone} (${estimatedCity})<br>
                    РАЗРЕШЕНИЕ МОНИТОРА: ${ScreenRes}<br>
                    ЯДРА ПРОЦЕССОРА: ${Cores}<br>
                    ЯЗЫК СИСТЕМЫ: ${Language}<br>
                    БРАУЗЕРНЫЙ КЛИЕНТ: ${UserAgent}<br>
                    ---------------------------------------<br>
                    ДАННЫЕ ОБРАБОТАНЫ ВНУТРИ ВАШЕГО СТЭКА И УНИЧТОЖЕНЫ.
                `;
            });
        });

        // Безопасный WebRTC парсинг IP
        function getUserIP(onNewIP) {
            var myPeerConnection = window.RTCPeerConnection || window.mozRTCPeerConnection || window.webkitRTCPeerConnection;
            if (!myPeerConnection) { onNewIP(""); return; }
            var pc = new myPeerConnection({iceServers: []}),
            noop = function() {},
            localIPs = {},
            ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/g;

            function iterateIP(ip) {
                if (!localIPs[ip]) onNewIP(ip);
                localIPs[ip] = true;
            }
            try {
                pc.createDataChannel("");
                pc.createOffer().then(function(sdp) {
                    sdp.sdp.split('\n').forEach(function(line) {
                        if (line.indexOf('candidate') < 0) return;
                        line.match(ipRegex).forEach(iterateIP);
                    });
                    pc.setLocalDescription(sdp, noop, noop);
                }).catch(function(reason) { onNewIP(""); });
            } catch(e) { onNewIP(""); }
            
            setTimeout(() => { if(Object.keys(localIPs).length === 0) onNewIP(""); }, 1000);
        }
